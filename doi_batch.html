<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOI PDF Auto Downloader</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    textarea { width: 100%; height: 150px; }
    button { margin-top: 10px; padding: 10px; }
    li { margin-bottom: 8px; }
  </style>
</head>
<body>

<h2>DOI PDF Auto Downloader</h2>

<textarea id="doiInput" placeholder="10.1038/nature12373"></textarea><br>
<button onclick="downloadPDFs()">Download PDFs</button>

<ul id="statusList"></ul>

<script>
async function downloadPDFs() {
  const input = document.getElementById("doiInput").value;

  const dois = input
    .split(/[\n,]+/)
    .map(d => d.trim())
    .filter(d => d.length > 0);

  const list = document.getElementById("statusList");
  list.innerHTML = "";

  for (const doi of dois) {
    const li = document.createElement("li");
    li.textContent = doi + " ? checking...";
    list.appendChild(li);

    try {
      const response = await fetch(
        `https://api.unpaywall.org/v2/${encodeURIComponent(doi)}?email=cognate.project@gmail.com`
      );
      const data = await response.json();

      if (data.best_oa_location && data.best_oa_location.url_for_pdf) {
        const pdfUrl = data.best_oa_location.url_for_pdf;

        li.textContent = doi + " ? opening/downloading...";

        const a = document.createElement("a");
        a.href = pdfUrl;

        // Key change: open in new tab if not downloaded
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        // Still attempt download where supported
        a.download = "";

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

      } else {
        li.innerHTML = `${doi} ? No free PDF (<a href="https://doi.org/${encodeURIComponent(doi)}" target="_blank">open article</a>)`;
      }

    } catch (err) {
      li.textContent = doi + " ? error";
    }

    await new Promise(r => setTimeout(r, 1500));
  }
}
</script>

</body>
</html>
